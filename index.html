<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto Digital</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:#000;
    color:#f2b705;
    padding:40px 20px;
    text-align:center;
}

.logo{
    width:120px;
    border-radius:50%;
    margin-bottom:15px;
}

.buscador{
    text-align:center;
    padding:30px;
}

input, select{
    padding:10px;
    width:250px;
    border-radius:6px;
    border:1px solid #ccc;
    margin:5px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    max-width:1200px;
    margin:40px auto;
    padding:0 20px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.producto-img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:15px;
}

.precio{
    font-weight:bold;
    margin:10px 0;
}

.btn{
    display:inline-block;
    padding:8px 15px;
    background:#f2b705;
    color:#000;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <img src="img/logo.png" class="logo" alt="Logo">
    <h1>Punto Digital</h1>
    <p>Tecnología al mejor precio</p>
</header>

<div class="buscador">
    <input type="text" id="busqueda" placeholder="Buscar producto...">

    <select id="filtroCategoria">
        <option value="Todos">Todas las categorías</option>
        <option value="Auriculares">Auriculares</option>
        <option value="Smartwatch">Smartwatch</option>
        <option value="Audio">Audio</option>
        <option value="Gaming">Gaming</option>
        <option value="Herramientas">Herramientas</option>
        <option value="Pendrives y memorias">Pendrives y memorias</option>
        <option value="Camping">Camping</option>
        <option value="Termos y botellas">Termos y botellas</option>
        <option value="Juguetes">Juguetes</option>
        <option value="Belleza y cuidado personal">Belleza y cuidado personal</option>
        <option value="Accesorios para celulares">Accesorios para celulares</option>
        <option value="Hogar">Hogar</option>
        <option value="Cocina">Cocina</option>
        <option value="Vehículos">Vehículos</option>
    </select>
</div>

<div class="grid" id="productos"></div>

<footer>
© 2026 Punto Digital - Todos los derechos reservados
</footer>

<script src="productos.js"></script>

<script>
const contenedor = document.getElementById("productos");
const inputBusqueda = document.getElementById("busqueda");
const filtroCategoria = document.getElementById("filtroCategoria");

function mostrarProductos(lista){
    contenedor.innerHTML = "";

    lista.forEach(producto => {
        contenedor.innerHTML += `
        <div class="card">
            <img src="img/${producto.imagen}" 
                 alt="${producto.nombre}" 
                 class="producto-img">

            <h3>${producto.nombre}</h3>
            <p><strong>${producto.categoria}</strong></p>
            <div class="precio">$${producto.precio.toLocaleString()}</div>

            <a href="https://wa.me/5492625460527?text=Hola%20quiero%20consultar%20por%20${producto.nombre}" 
               target="_blank" 
               class="btn">
               Consultar
            </a>
        </div>
        `;
    });
}

function filtrarProductos(){
    const texto = inputBusqueda.value.toLowerCase();
    const categoria = filtroCategoria.value;

    let filtrados = productos.filter(p =>
        p.nombre.toLowerCase().includes(texto)
    );

    if(categoria !== "Todos"){
        filtrados = filtrados.filter(p =>
            p.categoria === categoria
        );
    }

    mostrarProductos(filtrados);
}

inputBusqueda.addEventListener("keyup", filtrarProductos);
filtroCategoria.addEventListener("change", filtrarProductos);

mostrarProductos(productos);
</script>

</body>
</html>
