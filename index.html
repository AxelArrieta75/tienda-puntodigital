<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Digital - Catálogo Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="img/logo.png" alt="Punto Digital Logo" class="logo-principal" onerror="this.src='https://via.placeholder.com/150/f2b705/000000?text=Punto+Digital'">
        <div class="brand-text-container">
            <h1 class="brand-name">Punto Digital</h1>
            <p class="brand-slogan">Tu mundo digital, en un punto.</p>
        </div>
    </header>

    <nav class="sticky-nav">
        <div class="search-box">
            <div class="search-wrapper">
                <input type="text" id="busqueda" placeholder="¿Qué estás buscando hoy?">
                <button id="btn-limpiar-busqueda" onclick="limpiarBuscador()">&times;</button>
            </div>
        </div>
        <div class="category-bar-double" id="grid-categorias"></div>
    </nav>

    <main class="products-grid" id="contenedor-productos"></main>

    <div id="cart-float" onclick="toggleCarrito()">
        🛒<span id="cantidad-badge">0</span>
    </div>

    <div id="toast-container"></div>

    <div id="carrito-lateral" class="cart-sidebar">
        <div class="cart-header">
            <h2 style="margin:0; font-size:1.2rem;">Tu Carrito</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn-vaciar" onclick="vaciarCarrito()" title="Vaciar Carrito">🗑️ Vaciar</button>
                <button class="btn-close" onclick="toggleCarrito()">&times;</button>
            </div>
        </div>
        
        <div class="cart-body" id="lista-carrito"></div>

        <div class="cart-footer">
            <div class="total-container">
                <span>Total:</span>
                <span id="total-monto">$0</span>
            </div>

            <div style="margin-bottom: 15px;">
                <input type="text" id="cupon-input" placeholder="¿Tenés un cupón de descuento?" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; text-transform: uppercase; font-family: inherit;">
                <p id="cupon-mensaje" style="margin: 5px 0 0 0; font-size: 12px; font-weight: bold; display: none;"></p>
            </div>

            <div style="margin-bottom: 15px; border-top: 1px solid #222; padding-top: 15px;">
                <input type="text" id="cliente-nombre" placeholder="Tu Nombre y Apellido" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-bottom: 8px; font-family: inherit;">
                <input type="tel" id="cliente-telefono" placeholder="Tu Teléfono (ej: 2604______)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-bottom: 8px; font-family: inherit;">
                
                <select id="metodo-entrega" onchange="alternarCampoDireccion()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-bottom: 8px; font-family: inherit; cursor: pointer;">
                    <option value="retiro">Retiro en Local (Gratis)</option>
                    <option value="envio">Envío a Domicilio</option>
                </select>

                <input type="text" id="cliente-direccion" placeholder="Calle, Número y Barrio" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ff3838; background: #111; color: white; box-sizing: border-box; display: none; margin-bottom: 8px; font-family: inherit;">

                <select id="metodo-pago" onchange="alternarDatosTransferencia()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; font-family: inherit; cursor: pointer;">
                    <option value="efectivo">Efectivo / Abonar al recibir</option>
                    <option value="transferencia">Transferencia Bancaria / Virtual</option>
                </select>

                <div id="datos-transferencia-box" style="display: none; background: #1a1a1a; border: 1px dashed var(--amarillo); padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 0.85rem; color: #ddd; line-height: 1.4;">
                    <strong style="color: var(--amarillo);">Datos para Transferencia:</strong><br>
                    <span id="txt-datos-banco">Cargando datos...</span>
                </div>
            </div>

            <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar Pedido por WhatsApp</button>
        </div>
    </div>

    <div id="modal-detalle" class="modal" onclick="cerrarModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="productos.js?v=1.3"></script>
</body>
</html>
