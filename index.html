<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <img src="img/logo.png" class="logo-principal" alt="Logo">
    <h1 class="brand-name">PUNTO DIGITAL</h1>
    <p class="slogan">Tu mundo digital, en un punto.</p>
</header>

<nav class="sticky-nav">
    <div class="search-box">
        <input type="text" id="busqueda" placeholder="¿Qué buscas hoy?">
    </div>
    <div id="grid-categorias" class="category-bar-double"></div>
</nav>

<main id="contenedor-productos" class="products-grid"></main>

<div id="cart-float" onclick="toggleCarrito()">
    🛒 <span id="cantidad-badge">0</span>
</div>

<div id="modal-detalle" class="modal" onclick="cerrarModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="cerrarModal(null)">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<aside id="carrito-lateral" class="cart-sidebar">
    <div class="cart-header">
        <h2>Tu Pedido</h2>
        <button onclick="toggleCarrito()" class="btn-close">✕</button>
    </div>
    <div id="lista-carrito" class="cart-body"></div>
    <div class="cart-footer">
        <div class="total-container">
            <span>Total:</span>
            <span id="total-monto">$0</span>
        </div>
        <button onclick="enviarWhatsApp()" class="btn-whatsapp">Finalizar por WhatsApp</button>
    </div>
</aside>

<script src="productos.js"></script>
</body>
</html>
